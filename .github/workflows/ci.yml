name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: apps/api/coverage

  integration:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:integration --workspace=apps/api
        env:
          # Testcontainers spins up Postgres + Redis on the fly via the Docker daemon.
          TESTCONTAINERS_RYUK_DISABLED: "true"

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: docker compose up -d postgres redis mailhog
      - run: npm run test:e2e
        env:
          TELECOM_HD_DB_HOST: localhost
          TELECOM_HD_REDIS_HOST: localhost

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/api/Dockerfile -t telecom-hd-api .
      - run: docker build -f apps/web/Dockerfile -t telecom-hd-web .
