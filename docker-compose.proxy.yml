# Caddy reverse proxy + automatic TLS (Let's Encrypt) for the prod stack.
#
# Run it alongside the prod compose (same project → same default network, so
# Caddy reaches `api:4000` and `web:3000` by service name):
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.proxy.yml \
#     --env-file .env.prod up -d --build
#
# Requires DOMAIN=<your-host> in .env.prod (no scheme), and host ports 80/443 free.

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
