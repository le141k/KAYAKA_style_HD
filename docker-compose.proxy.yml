# REFERENCE EDGE ONLY — this file publishes 80/443 and must never be included in
# the base production deploy. Follow the separate HTTPS edge gate in
# docs/DEPLOY.md after trusted proxy hops, firewall rollback and smoke are reviewed.
# There is intentionally no generic `docker compose up` command here.

services:
  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    # Caddy receives only the hostname it needs, never application/DB/mail secrets.
    environment:
      DOMAIN: ${DOMAIN:?set in .env.prod}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
