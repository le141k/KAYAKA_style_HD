# 23 Telecom Help Desk — PRODUCTION compose profile.
#
# Differences vs the dev docker-compose.yml:
#   - NODE_ENV=production everywhere (secure cookies, info logging).
#   - The API refuses to boot with default/placeholder secrets (see
#     configuration.ts assertProductionSecrets) — set strong values in .env.prod.
#   - No automatic seed (TELECOM_HD_SEED unset → seed skips in production), so the
#     demo admin is NOT recreated. Run it once intentionally with TELECOM_HD_SEED=1.
#   - No MailHog: point TELECOM_HD_SMTP_* at a real SMTP relay in .env.prod.
#   - restart: unless-stopped on every service.
#   - Postgres/Redis are NOT published to the host (internal network only).
#   - The browser API origin is baked at build time via the NEXT_PUBLIC_API_URL
#     build arg (Next inlines NEXT_PUBLIC_* — runtime env has no effect).
#
# PRODUCTION OPERATORS: do not run this file directly. Use
# `scripts/deploy-prod.sh` via `docs/DEPLOY.md`; it enforces main provenance,
# backups, restore rehearsals, Redis migration and an internal-only launch.
#
# HTTPS edge enablement is a separate reviewed gate after internal deployment.

name: telecom-hd-prod

services:
  postgres:
    image: postgres:16.14-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TELECOM_HD_DB_USER:?set in .env.prod}
      POSTGRES_PASSWORD: ${TELECOM_HD_DB_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${TELECOM_HD_DB_NAME:?set in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TELECOM_HD_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7.4.8-alpine
    restart: unless-stopped
    # Require a password — even on the internal network, an unauthenticated Redis
    # lets any compromised container read/write the BullMQ queues and token state.
    command:
      [
        "redis-server",
        "--requirepass",
        "${TELECOM_HD_REDIS_PASSWORD:?set in .env.prod}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
      ]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${TELECOM_HD_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Mandatory production malware scanner. It is isolated on the Compose network;
  # port 3310 is never published to the host. Production commands always enable
  # the `scanner` profile and the API waits for this health check.
  clamav:
    image: clamav/clamav:1.5.3
    profiles: ["scanner"]
    restart: unless-stopped
    expose:
      - "3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 6m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 3G

  # A named volume can predate the current non-root API image. Initialise its
  # ownership before the API starts, while keeping the long-running API process
  # unprivileged. -h/-R avoids following a symlink outside this volume.
  uploads-init:
    image: node:22.23.1-alpine3.23
    user: "0:0"
    restart: "no"
    volumes:
      - uploads:/app/uploads
    command: ["sh", "-ec", "mkdir -p /app/uploads && chown -Rh 1000:1000 /app/uploads"]

  api:
    image: telecom-hd-api:${TELECOM_HD_RELEASE:?set immutable release id in .env.prod}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: ${TELECOM_HD_ENV_FILE:-.env.prod}
    environment:
      NODE_ENV: production
      # connection_limit/pool_timeout tune the Prisma pool so API handlers + the
      # BullMQ workers sharing this client don't exhaust/contend under load.
      DATABASE_URL: postgresql://${TELECOM_HD_DB_USER}:${TELECOM_HD_DB_PASSWORD}@postgres:5432/${TELECOM_HD_DB_NAME}?schema=public&connection_limit=${TELECOM_HD_DB_POOL:-20}&pool_timeout=20
      REDIS_URL: redis://:${TELECOM_HD_REDIS_PASSWORD}@redis:6379
    # API is NOT published to the host — the reverse proxy reaches it over the
    # internal docker network. Only `expose` (container-to-container).
    expose:
      - "4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      uploads-init:
        condition: service_completed_successfully
    # Bootstrap credentials are never part of the long-running container env.
    # First-install admin creation is an explicit one-shot deploy step.
    command: ["sh", "-c", "npx prisma migrate deploy && exec node dist/main.js"]
    # node:alpine ships busybox wget (not curl) — use wget for the in-container probe.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  web:
    # The browser bundle also depends on NEXT_PUBLIC_* build arguments. Including
    # their digest prevents a same-commit rebuild from overwriting another variant.
    image: telecom-hd-web:${TELECOM_HD_RELEASE:?set immutable release id in .env.prod}-${TELECOM_HD_WEB_BUILD_ID:?set by scripts/deploy-prod.sh}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # API origin baked into the browser bundle. Leave EMPTY for a relative
        # `/api` base (recommended: works on any hostname — tailnet, tunnel, domain,
        # IP — since the reverse proxy serves API + web on the same origin). Set it
        # to an absolute origin only for a cross-origin API host.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      TELECOM_HD_API_URL: http://api:4000
    # Behind the reverse proxy too — not published to the host.
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    # Probe /login (returns 200) — the root "/" 307-redirects to /kb and busybox
    # wget exits non-zero on a 3xx, which would mark web permanently unhealthy.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  pgdata:
  redisdata:
    name: telecom-hd-prod-redisdata
  uploads:
