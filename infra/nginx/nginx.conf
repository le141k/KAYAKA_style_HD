# 23 Telecom Help Desk — nginx reverse proxy with TLS.
#
# HOW TO RUN (as an extra compose service):
#
#   1. Place your certificate + key at:
#        infra/nginx/certs/fullchain.pem
#        infra/nginx/certs/privkey.pem
#      (e.g. from Certbot, or mount a Let's Encrypt volume).
#
#   2. Add to docker-compose.proxy.yml alongside the prod compose:
#
#        services:
#          nginx:
#            image: nginx:1.27-alpine
#            restart: unless-stopped
#            ports:
#              - "80:80"
#              - "443:443"
#            volumes:
#              - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
#              - ./infra/nginx/certs:/etc/nginx/certs:ro
#            networks:
#              - telecom-hd-prod_default
#
#   3. Bring everything up:
#        docker compose \
#          -f docker-compose.prod.yml \
#          -f docker-compose.proxy.yml \
#          --env-file .env.prod up -d
#
# DOMAIN: replace ${DOMAIN} below with your real domain (or use envsubst
#   to template this file before mounting it into the container):
#     envsubst '${DOMAIN}' < infra/nginx/nginx.conf > /tmp/nginx.conf
#
# COOKIES / AUTH: The API sets HttpOnly + Secure session cookies.
# nginx does NOT strip Set-Cookie or Cookie by default.
# Do not add proxy_hide_header Set-Cookie anywhere in this config.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------------------------------------------------------------
    # Logging
    # ----------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ----------------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------------
    gzip             on;
    gzip_comp_level  5;
    gzip_min_length  1024;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ----------------------------------------------------------------
    # Upload size limit — match the API's multer 25 MB limit.
    # ----------------------------------------------------------------
    client_max_body_size 25m;

    # ----------------------------------------------------------------
    # WebSocket upgrade helper map
    # ----------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ----------------------------------------------------------------
    # HTTP → HTTPS redirect
    # ----------------------------------------------------------------
    server {
        listen      80;
        server_name ${DOMAIN};

        # Allow ACME HTTP-01 challenge (Certbot webroot).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------------
    # HTTPS main server block
    # ----------------------------------------------------------------
    server {
        listen      443 ssl;
        http2       on;
        server_name ${DOMAIN};

        # ---- TLS ----
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS settings (Mozilla Intermediate profile).
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ---- Security headers ----
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

        # ---- Common proxy settings ----
        # Preserve the original Host header so the API's CORS check against
        # TELECOM_HD_PUBLIC_URL resolves correctly.
        proxy_set_header  Host              $host;

        # Standard forwarding headers; the API logs and CORS middleware rely on these.
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;

        # WebSocket upgrade (for future real-time / SSE endpoints).
        proxy_set_header  Upgrade           $http_upgrade;
        proxy_set_header  Connection        $connection_upgrade;

        # Do NOT strip: Cookie or Set-Cookie — required for HttpOnly auth sessions.
        # nginx does not strip these by default; do not add proxy_hide_header for them.

        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # ---- Inbound mail webhook: a raw RFC822 message can be larger than the global
        #      25m upload cap. Must match the API's TELECOM_HD_INBOUND_MAX_SIZE_MB (35 MB);
        #      keep a little headroom for headers. Longest-prefix match wins over /api/. ----
        location /api/inbound/pipe {
            proxy_pass http://api:4000;
            client_max_body_size 36m;
        }

        # ---- /api/* → API on port 4000 ----
        location /api/ {
            proxy_pass http://api:4000;

            # The global client_max_body_size 25m covers JSON + the 25 MB multer upload cap;
            # the inbound webhook overrides it above.
        }

        # ---- Everything else → Next.js frontend on port 3000 ----
        location / {
            proxy_pass http://web:3000;

            # Cache-bust for Next.js static assets served under /_next/static/.
            location /_next/static/ {
                proxy_pass  http://web:3000;
                add_header  Cache-Control "public, max-age=31536000, immutable";
            }
        }
    }
}
