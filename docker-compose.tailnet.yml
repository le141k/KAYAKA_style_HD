# LEGACY DIAGNOSTIC overlay — publishes :1488 over plain HTTP (Tailscale-only).
# Production browser authentication uses Secure cookies, so login cannot work over
# this origin. Do not use it as the production/user-facing deployment path; use an
# HTTPS origin via docker-compose.proxy.yml (or an approved HTTPS tunnel) instead.
# This is a reference diagnostic override, not a deploy command. Use only after
# the internal release from scripts/deploy-prod.sh is green and the exact :1488
# firewall allowlist has been reviewed.
#
# api/web stay internal (expose-only); only this proxy binds a host port — and
# nftables (infra/nftables/helpdesk.nft) restricts :1488 to the tailnet/LAN.
# Keep NEXT_PUBLIC_API_URL empty; browser testing still requires HTTPS termination.

services:
  proxy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    # Bind on the host so the tailnet/LAN can reach it; nftables gates the source.
    ports:
      - "1488:1488"
    volumes:
      - ./infra/caddy/Caddyfile.tailnet:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  caddy_data:
  caddy_config:
